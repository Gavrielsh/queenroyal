# ──────────────────────────────────────────────────────────────────────────────
# Redis Sentinel — node 1 of 3 (the HA control plane for Zone 2).
#
# Monitors the master "qrmaster" with a QUORUM of 2: two sentinels must independently
# agree the master is down before a failover is authorised. This file is one node of a
# 3-sentinel production cluster; staging runs this single representative node (so an
# actual automatic failover requires the full production quorum to be present).
#
# NOTE: Sentinel rewrites its own config at runtime (CONFIG REWRITE), so this file must
# be served from a WRITABLE path — the staging compose copies it to /tmp before launch.
# ──────────────────────────────────────────────────────────────────────────────

port 26379

# Address the data nodes by their docker-network hostnames (Redis 6.2+) instead of raw
# IPs, and announce hostnames to clients so ioredis can reach the discovered master.
sentinel resolve-hostnames yes
sentinel announce-hostnames yes

# sentinel monitor <master-name> <host> <port> <quorum>
sentinel monitor qrmaster redis-master 6379 2

# Master is "subjectively down" after 5s unreachable from this sentinel.
sentinel down-after-milliseconds qrmaster 5000
# Reconfigure at most one replica at a time while promoting a new master (safe default).
sentinel parallel-syncs qrmaster 1
# Abort and retry a failover that has not completed within 15s.
sentinel failover-timeout qrmaster 15000

# Credential used to authenticate to the master/replicas — must match `requirepass`
# (and `masterauth`) on the data nodes. Staging dummy; rotate via secrets in production.
sentinel auth-pass qrmaster qr_redis_dev_pw
