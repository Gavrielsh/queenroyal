;; ──────────────────────────────────────────────────────────────────────────────
;; PgBouncer — Zone 2 Financial Gateway connection pooler.
;;
;; TRANSACTION pool mode is MANDATORY. It returns a backend connection to the pool at
;; the END OF EVERY TRANSACTION, so N stateless Fastify replicas multiplex onto a small,
;; fixed set of real Postgres backends. This is precisely what lets the API scale
;; horizontally without exhausting Postgres `max_connections`.
;;
;; Because transaction pooling rotates backends between statements, clients MUST NOT rely
;; on session state or SERVER-SIDE PREPARED STATEMENTS. Prisma is therefore configured with
;; `?pgbouncer=true` (see apps/financial-gateway/prisma/schema.prisma), which disables named
;; prepared statements. Schema migrations CANNOT run through here — they connect directly to
;; Postgres on :5432 via DIRECT_DATABASE_URL.
;; ──────────────────────────────────────────────────────────────────────────────

[databases]
;; Logical DB exposed on :6432  →  real Postgres backend (compose service `postgres-db`).
queenroyal = host=postgres-db port=5432 dbname=queenroyal

[pgbouncer]
;; ── Listener ──────────────────────────────────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 6432

;; ── Authentication ────────────────────────────────────────────────────────────
;; md5 verifiers live in userlist.txt and are kept in lock-step with the Postgres md5
;; passwords (the backend is forced to `password_encryption=md5` in the staging compose).
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

;; ── Pooling: TRANSACTION mode (REQUIRED for horizontal scaling) ────────────────
pool_mode = transaction
;; Max client-side connections PgBouncer will accept (the whole Fastify fleet fans in here).
max_client_conn = 10000
;; Real Postgres backends opened per (user, database) pair — the ACTUAL load on Postgres.
default_pool_size = 25
;; A little standing headroom + burst reserve so a spike never fully starves normal traffic.
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

;; In transaction mode the reset query must be EMPTY: a pooled client holds no session state
;; to discard, and DISCARD ALL cannot run mid-transaction-rotation anyway.
server_reset_query =
;; Allow libpq/Prisma to send startup parameters PgBouncer does not itself interpret.
ignore_startup_parameters = extra_float_digits

;; ── Backend connection hygiene ────────────────────────────────────────────────
server_idle_timeout = 600
server_lifetime = 3600
;; Fail closed under saturation: don't let a client wait forever for a free backend.
query_wait_timeout = 120

;; ── Admin / observability (SHOW POOLS / SHOW STATS on the `pgbouncer` admin DB) ─
admin_users = queenroyal
stats_users = queenroyal

;; ── Logging ───────────────────────────────────────────────────────────────────
log_connections = 1
log_disconnections = 1
